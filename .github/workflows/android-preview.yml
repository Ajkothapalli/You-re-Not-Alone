name: Android Preview Build

on:
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Expo + EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Build APK (local — does not use EAS build quota)
        run: |
          eas build --local \
            --platform android \
            --profile preview \
            --non-interactive \
            --output ${{ github.workspace }}/app-preview.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-preview-${{ github.run_number }}
          path: ${{ github.workspace }}/app-preview.apk
          retention-days: 14
